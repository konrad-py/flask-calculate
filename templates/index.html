<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista zakupów</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css' ) }}">
</head>

<body>
    <div class="container mt-4">
    <form id="zakupy" action="{{ form_action }}" method="POST">
        <h1>Lista zakupów</h1><br>
        <label for="produkt" class="form-label">Produkt</label>
        <input type="text" id="produkt" name="produkt" value="{{ produkt_value }}" class="form-control"><br>
        <label for="ilosc" class="form-label">Ilość</label>
        <input type="text" id="ilosc" name="ilosc" value="{{ ilosc_value }}" class="form-control">
        <input type='submit' value='dodaj' class="btn btn-primary">
    </form>
    <table class="table table-striped table-hover">
        <tr>
            <th>Produkt</th>
            <th>Ilość</th>
            <th>Usuń</th>
            <th>Edytuj</th>
        </tr>
        {% for produkty, ilosc in produkt %}
        <tr>
            <td>{{ produkty }}</td>
            <td>{{ ilosc }}</td>
            <td><a href="{{ url_for('usun', id=loop.index0) }}" class="btn btn-primary">Usuń</a></td>
            <td><a href="{{ url_for('index', edit=loop.index0) }}" class="btn btn-primary">Edytuj</a></td>
        </tr>
        {% endfor %}
    </table>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </div>
    </body>

</html>

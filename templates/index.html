<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista zakupów</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css' ) }}">
</head>

<body>
    <div class="container mt-4">
        <div class="card p-4 mb-4">
    <form id="zakupy" action="{{ form_action }}" method="POST">
        <h1 class="mb-4">Lista zakupów</h1>
        <div class="mb-3">
            <label for="produkt" class="form-label">Produkt</label>
            <input type="text" id="produkt" name="produkt" value="{{ produkt_value }}" class="form-control">
        </div>
        <div class="mb-3">
            <label for="ilosc" class="form-label">Ilość</label>
            <input type="text" id="ilosc" name="ilosc" value="{{ ilosc_value }}" class="form-control">
        </div>
        <input type='submit' value='dodaj' class="btn btn-primary">
        
    </form>
    </div>
    <table class="table table-striped table-hover mt-4">
        <tr>
            <th class="text-center">Produkt</th>
            <th class="text-center">Ilość</th>
            <th class="text-center">Usuń</th>
            <th class="text-center">Edytuj</th>
        </tr>
        {% for produkty, ilosc in produkt %}
        <tr>
            <td class="text-center">{{ produkty }}</td>
            <td class="text-center">{{ ilosc }}</td>
            <td class="text-center"><a href="{{ url_for('usun', id=loop.index0) }}" class="btn btn-sm btn-danger">Usuń</a></td>
            <td class="text-center"><a href="{{ url_for('index', edit=loop.index0) }}" class="btn btn-sm btn-warning">Edytuj</a></td>
        </tr>
        {% endfor %}
    </table>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </div>
    </body>

</html>

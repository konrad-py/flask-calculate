<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budowa domu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css' ) }}">
</head>

<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between mb-3">
        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger">Wyloguj</a><a href="{{ url_for('index') }}" class="btn btn-sm btn-secondary">Lista zakupów</a><a href="{{ url_for('budowa') }}" class="btn btn-sm btn-secondary">Odśwież</a>
        </div>
        <div class="card p-4 mb-4">
    <form id="budowa" action="{{ form_action }}" method="POST">
        <h1 class="mb-4">Budowa domu</h1>
        {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
        {% endif %}
        <div class="mb-3">
            <label for="produkt" class="form-label">Produkt</label>
            <input type="text" id="produkt" name="produkt" value="{{ produkt_value }}" class="form-control">
        </div>
        <div class="mb-3">
            <label for="koszt" class="form-label">Koszt</label>
            <input type="text" id="koszt" name="koszt" value="{{ koszt_value }}" class="form-control">
        </div>
        <div class="mb-3">
            <label for="ilosc" class="form-label">Ilość</label>
            <input type="text" id="ilosc" name="ilosc" value="{{ ilosc_value }}" class="form-control">
        </div>
        <div class="mb-3">
            <label for="sklep" class="form-label">Sklep</label>
            <input type="text" id="sklep" name="sklep" value="{{ sklep_value }}" class="form-control">
        </div>

        <input type='submit' value='dodaj' class="btn btn-primary">
        
    </form>
    </div>
    <table class="table table-striped table-hover mt-4">
        <tr>
            <th class="text-center align-middle">X</th>
            <th class="text-center align-middle">Produkt</th>
            <th class="text-center align-middle">Koszt<br>{{suma}}</th>
            <th class="text-center align-middle">Ilość</th>
            <th class="text-center align-middle">Sklep</th>
            <th class="text-center align-middle">Data</th>
            <th class="text-center align-middle">Ed</th>
        </tr>
        {% for item in budowa_items %}
        <tr>
            <td class="text-center align-middle"><a href="{{ url_for('budowa_usun', id=item['id']) }}" class="btn btn-sm btn-danger me-1">X</a></td>
            <td class="text-center align-middle">{{ item['produkt'] }}</td>
            <td class="text-center align-middle">{{ item['koszt'] }}</td>
            <td class="text-center align-middle">{{ item['ilosc'] }}</td>
            <td class="text-center align-middle">{{ item['sklep'] }}</td>
            <td class="text-center align-middle">{{ item['data'] }}</td>
            <td class="text-center align-middle"><a href="{{ url_for('budowa', edit=item['id']) }}" class="btn btn-sm btn-warning">Ed</a></td>
            
        </tr>
        {% endfor %}
    </table>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </div>
    </body>

</html>
